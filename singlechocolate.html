<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Shopify Product | Dark Header</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
    }

    /* ----- DARK HEADER STYLES (Deep dark color) ----- */
   .dark-header {
    height: 50px; /* kam height */
    background-color: #4b0118;
    color: #ffffff;
    padding: 0 2rem; /* upar niche padding hata di */
    display: flex;
    align-items: center;
    justify-content: space-between;
}

    /* Back button modern style */
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background-color: #000000;
      color: white;
      border: none;
      padding: 8px 20px;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    .back-btn:hover {
      background-color: #3a3f48;
      transform: translateY(-1px);
    }

    .back-btn:active {
      transform: translateY(1px);
    }

    /* Logo area - now holds an IMAGE (user can replace with any image URL) */
    .logo-area {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    /* Style for the actual logo image - fully customizable */
   .site-logo {
    height: 36px;
}

    /* Optional hover effect for logo */
    .site-logo:hover {
      opacity: 0.9;
    }

    /* main content wrapper - NO extra card/section above product, directly component */
    .shopify-root {
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    /* ensure product component takes full width and no extra spacing above */
    #product-component-1779876449961 {
      width: 100%;
    }

    /* For potential loading state */
    .shopify-placeholder {
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border-radius: 28px;
      color: #000000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
    }

    /* responsive styles */
    @media (max-width: 700px) {
      .dark-header {
        padding: 0.7rem 1.2rem;
      }
      .back-btn {
        padding: 6px 16px;
        font-size: 0.85rem;
      }
      .site-logo {
        height: 36px;
        max-width: 140px;
      }
      .shopify-root {
        padding: 0 1rem;
        margin: 1.2rem auto;
      }
    }

    /* Back icon */
    .back-icon-symbol {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1;
    }

    /* remove any default extra margins on product container */
    #product-component-1779876449961 {
      background: transparent;
    }
  </style>
</head>
<body>

<!-- DARK HEADER: Logo on LEFT side (image), Back button on RIGHT side -->
<header class="dark-header">
  <!-- LEFT side: Logo area - now uses an IMAGE tag. Replace the src with your actual image URL -->
  <div class="logo-area">
    <img 
      class="site-logo" 
      id="customLogoImage"
      src="mainlogo.png" 
      alt="Brand Logo"
      style="border-radius: 8px;"
    >
    <!-- 
      IMPORTANT: To add your own logo image, simply replace the src attribute above with your image URL.
      Example: src="https://yourwebsite.com/logo.png" or a local path like "images/logo.png"
      The image will automatically adapt to the dark header while keeping its original colors.
    -->
  </div>

  <!-- RIGHT side: Back button -->
  <button class="back-btn" id="backButton" aria-label="Go back">
    <span class="back-icon-symbol">←</span> Back
  </button>
</header>

<main class="shopify-root">
  <!-- Direct product component without any extra card wrapper or extra div above main product -->
  <div id='product-component-1779876449961'></div>
</main>

<!-- Back button functionality (simple history back) -->
<script>
  (function() {
    const backBtn = document.getElementById('backButton');
    if (backBtn) {
      backBtn.addEventListener('click', function(e) {
        e.preventDefault();
        if (window.history.length > 1) {
          window.history.back();
        } else {
          console.log("No previous page in history.");
          alert("No previous page to go back to.");
        }
      });
    }

    // Ensure no extra card wrapper or extra elements are added above the product.
    const styleNode = document.createElement('style');
    styleNode.textContent = `
      /* Remove any potential margin-top on the first child inside product component */
      #product-component-1779876449961 .shopify-buy__product {
        margin-top: 0 !important;
      }
      #product-component-1779876449961 {
        margin-top: 0;
      }
      .shopify-buy__product {
        background: transparent;
      }
    `;
    document.head.appendChild(styleNode);
  })();
</script>

<!-- Additional style to keep clean layout and ensure logo image looks great -->
<style>
  /* Make sure no margin/padding on the container that would create extra visual gap */
  .shopify-root {
    background: transparent;
  }
  #product-component-1779876449961 {
    background: transparent;
  }
  .back-btn:focus-visible {
    outline: 2px solid white;
    outline-offset: 2px;
    border-radius: 40px;
  }
  /* Ensure any logo image loads with proper aspect ratio */
.site-logo {
    height: 100px;
    width: auto;
    object-fit: contain;
    background: transparent;
}

/* Mobile */
@media (max-width: 480px) {
    .dark-header {
        padding: 0.7rem 1rem;
    }

    .site-logo {
        max-width: 120px;
        height: 500px;
    }
}
  /* Optional: remove default blue border from images */
  img {
    border: 0;
  }
</style>
